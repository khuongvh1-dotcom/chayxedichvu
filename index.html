<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xe Dịch Vụ</title>
<!-- Cho iPhone -->
<link rel="apple-touch-icon" sizes="180x180" href="icon.png">

<!-- Cho Android -->
<link rel="icon" type="image/png" sizes="192x192" href="icon.png">

<!-- Chế độ app full màn hình -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Xe Dịch Vụ">

<style>
* {
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    margin: 0;
    background: linear-gradient(135deg, #1b5e20, #26a69a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    background: #f1f8f4;
    width: 92%;
    max-width: 420px;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

h1 {
    text-align: center;
    color: #1b5e20;
    margin-bottom: 15px;
}

/* Header cấu hình */
.config-bar {
    font-size: 13px;
    background: #e8f5e9;
    padding: 8px 10px;
    border-radius: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 18px;
}

.config-btn {
    cursor: pointer;
    font-size: 16px;
}

/* Input */
.input-group {
    margin-bottom: 18px;
}

label {
    font-size: 14px;
    font-weight: bold;
    color: #1b5e20;
    display: block;
    margin-bottom: 6px;
}

input {
    width: 100%;
    padding: 14px;
    font-size: 17px;
    border-radius: 12px;
    border: 2px solid #66bb6a;
    text-align: center;
    outline: none;
}

.result {
    margin-top: 20px;
    font-size: 16px;
    line-height: 1.8;
    text-align: left;
     font-family: "Segoe UI", Roboto, Arial, sans-serif;
}

/* Lợi nhuận nổi bật */
.profit {
    font-size: 22px;
    font-weight: 900;
}

/* Popup */
.popup-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.4);
    display: none;
    justify-content: center;
    align-items: center;
}

.popup {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
    max-width: 320px;
}

.popup h3 {
    margin-top: 0;
    color: #1b5e20;
}

.popup input {
    margin-bottom: 10px;
}

.popup button {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: #2e7d32;
    color: white;
    font-weight: bold;
}
.popup {
    background: white;
    padding: 20px;
    border-radius: 15px;
    width: 85%;
    max-width: 320px;
    position: relative;
}

.popup-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
}

.close-btn {
    font-size: 18px;
    cursor: pointer;
    font-weight: bold;
    color: #c62828;
}
.input-wrapper {
    position: relative;
}

.input-wrapper input {
    width: 100%;
    padding: 14px 40px 14px 14px; /* chừa chỗ bên phải cho nút */
    font-size: 17px;
    border-radius: 12px;
    border: 2px solid #66bb6a;
    text-align: center;
}

.clear-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: #c62828;
    display: none;
}

</style>
</head>
<body>

<div class="container">
    <h1>🌿 Tính Lợi Nhuận Xe Dịch Vụ</h1>

    <div class="config-bar">
        <span id="configInfo"></span>
        <span class="config-btn" onclick="openPopup()">⚙</span>
    </div>

  <div class="input-group">
    <label>Cự ly (km)</label>
    <div class="input-wrapper">
        <input type="text" id="km" inputmode="numeric" oninput="formatNumberInput(this)">
        <span class="clear-btn" onclick="clearInput('km')">✕</span>
    </div>
</div>
  <div class="input-group">
    <label>Phí cầu đường (VNĐ)</label>
    <div class="input-wrapper">
        <input type="text" id="cauduong" inputmode="numeric" oninput="formatNumberInput(this)">
        <span class="clear-btn" onclick="clearInput('cauduong')">✕</span>
    </div>
</div>
<div class="input-group">
    <label>Khách trả (VNĐ)</label>
    <div class="input-wrapper">
        <input type="text" id="customerPrice" inputmode="numeric" oninput="formatNumberInput(this)">
        <span class="clear-btn" onclick="clearInput('customerPrice')">✕</span>
    </div>
</div>


    <div class="result" id="result"></div>
</div>

<!-- Popup -->
<!-- Popup -->
<div class="popup-overlay" id="popup" onclick="closePopup(event)">
    <div class="popup">
        <div class="popup-header">
            <h3>Cấu hình</h3>
            <span class="close-btn" onclick="closePopup()">✕</span>
        </div>

        <div class="input-group">
            <label>Giá xăng (VNĐ)</label>
            <input type="text" id="fuelPricePopup" inputmode="numeric" oninput="formatNumberInput(this)" >
        </div>

        <div class="input-group">
            <label>Tiêu hao (L / 100km)</label>
            <input type="text" id="fuelRatePopup" inputmode="numeric">
        </div>

        <div class="input-group">
            <label>Hao mòn (VNĐ / km)</label>
            <input type="text" id="wearCostPopup" inputmode="numeric">
        </div>

        <button onclick="saveConfig()">Lưu</button>
    </div>
</div>


<script>
function clearInput(id) {
    document.getElementById(id).value = "";
    calculate();
    toggleClearButtons();
}

function toggleClearButtons() {
    ['km', 'customerPrice'].forEach(id => {
        const input = document.getElementById(id);
        const btn = input.parentElement.querySelector('.clear-btn');
        btn.style.display = input.value ? "block" : "none";
    });
}

document.getElementById("km").addEventListener("input", toggleClearButtons);
document.getElementById("customerPrice").addEventListener("input", toggleClearButtons);

    function closePopup(event) {
    if (!event || event.target.id === "popup") {
        document.getElementById("popup").style.display = "none";
    }
}

function formatNumberInput(input) {
    let value = input.value.replace(/\./g, '').replace(/\D/g, '');
    if (!value) {
        input.value = "";
        calculate();
        return;
    }
    input.value = parseInt(value).toLocaleString('vi-VN');
    calculate();
}

function getRawNumber(id) {
    const el = document.getElementById(id);
    if (!el || !el.value) return 0;
    return parseFloat(el.value.replace(/\./g, '')) || 0;
}

function calculate() {
    const fuelPrice = parseFloat(localStorage.getItem("fuelPrice")) || 19000;
    const fuelRate = parseFloat(localStorage.getItem("fuelRate")) || 8;
    const wearCost = parseFloat(localStorage.getItem("wearCost")) || 700;

    const km = getRawNumber("km");
    const customerPrice = getRawNumber("customerPrice");
    const Phicauduong = getRawNumber("cauduong");
    if (!km || !customerPrice) {
        document.getElementById("result").innerText = "";
        return;
    }

    const haoMon = km * wearCost;
    const soLit = km * fuelRate / 100;
    const tienXang = soLit * fuelPrice;
    const tongChiPhi = haoMon + tienXang + Phicauduong;
    const loiNhuan = customerPrice - tongChiPhi;

    const color = loiNhuan >= 0 ? "#1b5e20" : "#c62828";

    document.getElementById("result").innerHTML =
        `Chi phí xăng: ${tienXang.toLocaleString('vi-VN')} VNĐ<br>
         Chi phí hao mòn: ${haoMon.toLocaleString('vi-VN')} VNĐ<br>
         Phí cầu đường: ${Phicauduong.toLocaleString('vi-VN')} VNĐ<br>
         Tổng chi phí: ${tongChiPhi.toLocaleString('vi-VN')} VNĐ<br><br>
         <div class="profit" style="color:${color}">
         LỢI NHUẬN: ${loiNhuan.toLocaleString('vi-VN')} VNĐ
         </div>`;
}

function openPopup() {
    document.getElementById("popup").style.display = "flex";

    document.getElementById("fuelPricePopup").value =
        (localStorage.getItem("fuelPrice") || 19000);

    document.getElementById("fuelRatePopup").value =
        (localStorage.getItem("fuelRate") || 8);

    document.getElementById("wearCostPopup").value =
        (localStorage.getItem("wearCost") || 700);
}

function saveConfig() {
    localStorage.setItem("fuelPrice",
        document.getElementById("fuelPricePopup").value.replace(/\D/g,''));

    localStorage.setItem("fuelRate",
        document.getElementById("fuelRatePopup").value.replace(/\D/g,''));

    localStorage.setItem("wearCost",
        document.getElementById("wearCostPopup").value.replace(/\D/g,''));

    document.getElementById("popup").style.display = "none";
    updateConfigInfo();
    calculate();
}

function updateConfigInfo() {
    const fuelPrice = parseFloat(localStorage.getItem("fuelPrice")) || 19000;
    const fuelRate = parseFloat(localStorage.getItem("fuelRate")) || 8;
    const wearCost = parseFloat(localStorage.getItem("wearCost")) || 700;

    document.getElementById("configInfo").innerText =
        `Xăng: ${fuelPrice.toLocaleString('vi-VN')} VNĐ.
         Tiêu hao: ${fuelRate}L/100km. 
         Hao mòn: ${wearCost.toLocaleString('vi-VN')}/km.`;
}

window.onload = function() {
    updateConfigInfo();
};
</script>

</body>
</html>
